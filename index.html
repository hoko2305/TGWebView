<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup Live Scores</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #1a1a1a; color: white; padding: 20px; }
        .header { text-align: center; margin-bottom: 20px; }
        .score-card { background: #2d2d2d; padding: 15px; border-radius: 10px; margin-bottom: 10px; }
        .match-info { display: flex; justify-content: space-between; align-items: center; }
        .team { font-size: 16px; font-weight: bold; }
        .score { font-size: 20px; font-weight: bold; color: #4CAF50; }
        .status { font-size: 12px; color: #ccc; margin-top: 5px; }
        /* 隐藏Telegram WebApp顶部栏（可选） */
        :root { --tg-viewport-height: 100vh; }
    </style>
    <!-- Telegram WebApp JS SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="header">
        <h1>🏆 2026 World Cup Live</h1>
        <p id="countdown"></p>
    </div>
    <div id="scores-container"></div>

    <script>
        // 1. 初始化Telegram WebApp（禁止缩放、跳转）
        const tg = window.Telegram.WebApp;
        tg.expand(); // 全屏显示
        tg.disableVerticalSwipes(); // 禁止下滑退出
        tg.setHeaderColor('#1a1a1a'); // 适配深色主题

        // 2. 禁止所有外部链接跳转（核心）
        document.addEventListener('click', (e) => {
            const target = e.target.closest('a');
            if (target && target.href) {
                e.preventDefault(); // 阻止跳转
                alert('External links are disabled in this app!'); // 可选：提示用户
            }
        });

        // 3. 世界杯倒计时
        function updateCountdown() {
            const wcStart = new Date('2026-06-11');
            const now = new Date();
            const days = Math.ceil((wcStart - now) / (1000 * 60 * 60 * 24));
            document.getElementById('countdown').textContent = `⏰ ${days} days to kick-off`;
        }
        updateCountdown();
        setInterval(updateCountdown, 86400000);

        // 4. 获取实时比分（用免费公开API，无外部跳转）
        async function loadLiveScores() {
            try {
                // 免费足球比分API（稳定、无广告）
                const res = await fetch('https://api.football-data.org/v4/competitions/WC/matches?status=IN_PLAY', {
                    headers: { 'X-Auth-Token': '28fc60a4b1a74c9a8d9f0f9abdb17952' } // 去https://www.football-data.org/免费获取
                });
                const data = await res.json();

                const container = document.getElementById('scores-container');
                if (data.matches.length === 0) {
                    container.innerHTML = '<div class="score-card">No live matches at the moment.</div>';
                    return;
                }

                // 渲染比分卡片（无外部链接）
                data.matches.forEach(match => {
                    const card = document.createElement('div');
                    card.className = 'score-card';
                    card.innerHTML = `
                        <div class="match-info">
                            <span class="team">${match.homeTeam.name}</span>
                            <span class="score">${match.score.fullTime.home} - ${match.score.fullTime.away}</span>
                            <span class="team">${match.awayTeam.name}</span>
                        </div>
                        <div class="status">${match.status} • ${match.stage}</div>
                    `;
                    container.appendChild(card);
                });
            } catch (e) {
                document.getElementById('scores-container').innerHTML = '<div class="score-card">Failed to load live scores.</div>';
            }
        }

        // 5. 加载比分并定时刷新（5分钟一次，不跳转）
        loadLiveScores();
        setInterval(loadLiveScores, 300000); // 5分钟刷新一次
    </script>
</body>
</html>
